---
name: Build and Push Container Image

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      oc_mirror_version:
        description: 'oc-mirror version (e.g. 4.22.0). Defaults to pinned CI version.'
        required: false
        default: '4.22.0'

jobs:
  build:
    runs-on: ubuntu-latest
    environment: deploy
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to quay.io
        uses: redhat-actions/podman-login@v1
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build container image
        run: |
          OC_MIRROR_VER="${{ github.event.inputs.oc_mirror_version || '4.22.0' }}"
          podman build \
            --build-arg OC_MIRROR_VERSION=${OC_MIRROR_VER} \
            -t dcm-oc-mirror:latest \
            -t dcm-oc-mirror:${{ github.sha }} \
            .

      - name: Push to quay.io
        uses: redhat-actions/push-to-registry@v2
        with:
          image: dcm-oc-mirror
          tags: latest ${{ github.sha }}
          registry: quay.io/${{ secrets.QUAY_USERNAME }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
...
